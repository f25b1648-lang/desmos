<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Integration Calculator</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0 0 8px 0;
            color: var(--primary);
        }

        p {
            margin: 0;
            color: #64748b;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 768px) {
            .layout {
                grid-template-columns: 300px 1fr;
            }
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            height: fit-content;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        input, select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: 2px solid var(--primary);
            border-color: transparent;
        }

        .result-box {
            margin-top: 12px;
            padding: 12px;
            background: #e0e7ff;
            border-left: 4px solid var(--primary);
            border-radius: 4px;
        }

        .result-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            font-weight: 700;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 4px;
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Integration Visualizer</h1>
        <p>A simple tool to calculate and view the definite integral (area under the curve)</p>
    </header>

    <div class="layout">
        <div class="controls">
            <div class="input-group">
                <label for="functionSelect">Choose Function f(x)</label>
                <select id="functionSelect">
                    <option value="x2">f(x) = x²</option>
                    <option value="sin">f(x) = sin(x) + 1.5</option>
                    <option value="linear">f(x) = 0.5x + 1</option>
                    <option value="poly">f(x) = -0.2x³ + x² + 1</option>
                </select>
            </div>

            <div class="input-group">
                <label for="inputA">Lower Bound (a)</label>
                <input type="number" id="inputA" value="0" step="0.5">
            </div>

            <div class="input-group">
                <label for="inputB">Upper Bound (b)</label>
                <input type="number" id="inputB" value="4" step="0.5">
            </div>

            <div class="result-box">
                <div class="result-title">Definite Integral Area</div>
                <div class="result-value" id="resultDisplay">0.00</div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="graphCanvas" width="600" height="450"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    
    // Inputs
    const functionSelect = document.getElementById('functionSelect');
    const inputA = document.getElementById('inputA');
    const inputB = document.getElementById('inputB');
    const resultDisplay = document.getElementById('resultDisplay');

    // Coordinate System Settings
    const axes = {
        xMin: -2,
        xMax: 6,
        yMin: -1,
        yMax: 6,
    };

    // Math functions mapping
    function evaluateFunction(type, x) {
        switch(type) {
            case 'x2': return x * x;
            case 'sin': return Math.sin(x) + 1.5;
            case 'linear': return 0.5 * x + 1;
            case 'poly': return -0.2 * Math.pow(x, 3) + (x * x) + 1;
            default: return 0;
        }
    }

    // Convert Math coordinates to Pixel coordinates
    function toPixelX(mathX) {
        return ((mathX - axes.xMin) / (axes.xMax - axes.xMin)) * canvas.width;
    }

    function toPixelY(mathY) {
        return canvas.height - (((mathY - axes.yMin) / (axes.yMax - axes.yMin)) * canvas.height);
    }

    // Exact numerical integration using Riemann Sums (very high precision for display)
    function calculateIntegral(type, a, b) {
        const steps = 10000;
        const dx = (b - a) / steps;
        let area = 0;
        for (let i = 0; i < steps; i++) {
            const x = a + i * dx + dx / 2; // Midpoint rule
            area += evaluateFunction(type, x) * dx;
        }
        return area;
    }

    function draw() {
        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const funcType = functionSelect.value;
        const a = parseFloat(inputA.value) || 0;
        const b = parseFloat(inputB.value) || 0;

        // 1. Draw Grid Lines & Axes
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 1;
        
        // Vertical grid lines
        for (let x = Math.ceil(axes.xMin); x <= Math.floor(axes.xMax); x++) {
            ctx.beginPath();
            ctx.moveTo(toPixelX(x), 0);
            ctx.lineTo(toPixelX(x), canvas.height);
            ctx.stroke();
            
            // X labels
            if (x !== 0) {
                ctx.fillStyle = '#94a3b8';
                ctx.font = '12px sans-serif';
                ctx.fillText(x, toPixelX(x) - 4, toPixelY(0) + 15);
            }
        }

        // Horizontal grid lines
        for (let y = Math.ceil(axes.yMin); y <= Math.floor(axes.yMax); y++) {
            ctx.beginPath();
            ctx.moveTo(0, toPixelY(y));
            ctx.lineTo(canvas.width, toPixelY(y));
            ctx.stroke();

            // Y labels
            if (y !== 0) {
                ctx.fillStyle = '#94a3b8';
                ctx.font = '12px sans-serif';
                ctx.fillText(y, toPixelX(0) - 15, toPixelY(y) + 4);
            }
        }

        // Main Axis Lines (X and Y identity lines)
        ctx.strokeStyle = '#64748b';
        ctx.lineWidth = 2;
        
        // X-Axis
        ctx.beginPath();
        ctx.moveTo(0, toPixelY(0));
        ctx.lineTo(canvas.width, toPixelY(0));
        ctx.stroke();

        // Y-Axis
        ctx.beginPath();
        ctx.moveTo(toPixelX(0), 0);
        ctx.lineTo(toPixelX(0), canvas.height);
        ctx.stroke();

        // 2. Draw Integrated Shaded Area (between a and b)
        if (a < b) {
            ctx.fillStyle = 'rgba(79, 70, 229, 0.25)';
            ctx.beginPath();
            ctx.moveTo(toPixelX(a), toPixelY(0));

            // Trace the curve from a to b
            const segments = 200;
            const dx = (b - a) / segments;
            for (let i = 0; i <= segments; i++) {
                const currentX = a + i * dx;
                const currentY = evaluateFunction(funcType, currentX);
                ctx.lineTo(toPixelX(currentX), toPixelY(currentY));
            }

            ctx.lineTo(toPixelX(b), toPixelY(0));
            ctx.closePath();
            ctx.fill();

            // Draw bound lines at a and b
            ctx.strokeStyle = 'rgba(79, 70, 229, 0.5)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);
            
            ctx.beginPath();
            ctx.moveTo(toPixelX(a), toPixelY(0));
            ctx.lineTo(toPixelX(a), toPixelY(evaluateFunction(funcType, a)));
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(toPixelX(b), toPixelY(0));
            ctx.lineTo(toPixelX(b), toPixelY(evaluateFunction(funcType, b)));
            ctx.stroke();
            
            ctx.setLineDash([]); // Reset line dash
        }

        // 3. Draw Entire Function Curve
        ctx.strokeStyle = '#4f46e5';
        ctx.lineWidth = 3;
        ctx.beginPath();
        
        const totalSegments = 300;
        const totalDx = (axes.xMax - axes.xMin) / totalSegments;
        
        for (let i = 0; i <= totalSegments; i++) {
            const currentX = axes.xMin + i * totalDx;
            const currentY = evaluateFunction(funcType, currentX);
            
            if (i === 0) {
                ctx.moveTo(toPixelX(currentX), toPixelY(currentY));
            } else {
                ctx.lineTo(toPixelX(currentX), toPixelY(currentY));
            }
        }
        ctx.stroke();

        // 4. Update Calculated Output Text
        const resultCalculated = calculateIntegral(funcType, a, b);
        resultDisplay.innerText = resultCalculated.toFixed(4);
    }

    // Attach listeners to update graph immediately when inputs change
    functionSelect.addEventListener('change', draw);
    inputA.addEventListener('input', draw);
    inputB.addEventListener('input', draw);

    // Initial draw on page load
    draw();
</script>

</body>
</html>
